front:
  text: 上清含象劎鑑圖國三
  hash: sha256:4dc846cdc42707fbdec5c766d1dddc59ea601609d6764f7ed87895a59dfdefc3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0115_HFL_000-001a, image: hfl/0196/0196-032.png}
body:
  text: 天台白雲司馬承禎進夫四規之法獨資於神術千年之竒唯求於鳥影舍光寫貌雖覩其儀尚象通靈罕存其制而鑑之為妙也貞質內凝湛然惟寂清暉外瑩覽馬遂通應而不藏至人之心愈顯照而徵影精變之形斯復所謂有貞明之道也有神靈之正也捧玩之寶莫先兹器既可以自見亦可以鑒物此鑑所以外圓內方取象天地也中列爻卦備著隂陽也太陽之精離為日也太隂之精坎為月也星緯五行通七曜也雷電在卯震為雷也天淵在酉兌為澤也雲分八卦節運四時也此表天之文矣其方周流為水以瀉四溟內置連山以旌五嶽山澤通氣品物存馬此立地之文也詞銘四句理應三才類而長之可以意得此寄言以明人之文也故曰含象鑑蓋總其義焉勒書于匣評觀制器之象矣天地含象日月貞明寫規萬物洞鑒百靈金龜緣地龜自卜鏡自照吉可募光不曜龜自卜鏡自照吉可募光不曜青蓋作鏡大吉昌巧工刋之成文章左龍右虎辟不祥朱鳥玄武順於旁子孫冨貴居中央景震劎序夫陽之精者著名於景隂之氣者發揮於震故以景震為名式備精氣之義是知貞質相契氣象攸通運用之機威靈有應撝神以形之義已覩於真規收鬼摧邪之理未聞於竒制此所以劎面合隂陽刻象法天地乾以魁罡為抄坤以雷電為綘而天罡所加何物不伏雷電所怒何物不摧佩之於身則有內外之衛施之於物則隨人鬼之用矣唐明皇御批并詩勑得所進明照寶劒等舍兩矅之暉稟八卦之象足使光廷仁壽影滅豐城佩服多情慙式四韻寶照含天地神劎合隂陽日月麗光景星斗截文章寫鑑表容質佩服為身防從兹一賞玩永德保齡長進司馬天師鑄舍象鑑表臣聞川嶽逢時猶能顯瑞草木應運尚或呈樣况臣生遏昌朝長居比屋茍有竒物合進眀庭臣先收得唐司馬天師為明皇所鑄舍象鑑一面家傳纍世掌祕多年其鑑外圓法天內方則池配坎離於日月布雲氣於山川右則定位於天淵左則表威於雷電八卦咸列四溟克周包其道於乾坤震其功於邪魅故名合象以應至尊其圓見祕於玄科其事顯存於道藏竊念臣樵漁賤族樗櫟頑材濫親鄒魯之風叨遇陶唐之化其鑑故難藏隱式合彰明謹隨狀上進凂迹天聰臣無任兢惶殞越激切屏營之至伏候勑旨景德二年十月日臣吳及狀奏鑄劒鏡法并藥凡鑄劎鏡須得百鋉真鐡可鑄凡鍊鐡既精無硃砂銀勾鐡不名精劒所以太古劎神鏡自軒轅黃帝受神胥公法後傳左丘子鏌鎁干將吳越奇霄公皆會神鑑靈劎法後人不得硃砂銀句添精鐡難以鑄成仐先火鍊硃砂成銀次鍊鐡句添相雜取年月日時劒鏡如前法所圖樣又别作尺寸辰樣或大小各有法度也鋉砂成銀法上色山澤銀半斤丹砂半斤鉛末半斤汞半斤右件杵令勻納瓷合中麵裏一重三指厚坐沙甑中蒸七日冷取出成上色銀復以垍合成固濟入灰池中養火十四日日足五斤火鍛取出𥃆蓋韛之立成至寶上清含象劎鑑圖終
